name: Build & Deploy Python App

on:
  push:
    branches: [ main ] # 只有推送到 main 分支才触发

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
  # 【注意】这里定义你的应用名字，建议和 K8s 里的 Deployment 名字保持一致
  APP_NAME: "my-python-app" 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. 拉取代码
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. 配置 AWS 凭证
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    # 3. 登录 ECR
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    # 4. 构建 Docker 镜像
    - name: Build image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }} # 使用 Git 的 commit ID 作为标签，确保唯一
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .

    # 5. 推送镜像到 ECR
    - name: Push image to ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

    # 6. 安装 kubectl 工具
    - name: Install kubectl
      uses: azure/setup-kubectl@v4

    # 7. 调试与配置
    - name: Write Kubeconfig
      env:
        KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG }}
      run: |
        mkdir -p ~/.kube
        printf '%s' "$KUBE_CONFIG_DATA" | base64 -d > ~/.kube/config
        
           # 8. 部署或更新应用 (修复了管道符报错)
    - name: Deploy to K3s
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        echo "🚀 正在部署应用到 K3s..."

        # 【关键点】将 kubectl create ... 和 kubectl apply ... 放在同一行，用管道符连接
        # --insecure-skip-tls-verify 用于跳过之前的证书报错
        kubectl create deployment $APP_NAME --image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG --replicas=1 --port=80 --dry-run=client -o yaml | kubectl apply --insecure-skip-tls-verify -f -

        echo "✅ 部署指令已发送"

    # 9. 等待部署完成
    - name: Wait for rollout
      run: |
        echo "⏳ 等待 Pod 启动并就绪..."
        # 同样加上 --insecure-skip-tls-verify 防止这里也报证书错
        kubectl rollout status deployment/$APP_NAME --timeout=120s --insecure-skip-tls-verify
