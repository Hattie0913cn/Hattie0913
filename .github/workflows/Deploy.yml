name: Build & Deploy Python App
on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取仓库代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 配置AWS凭证，登录ECR镜像仓库
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # 3. 登录AWS ECR
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 4. 构建镜像并打上ECR标签
      - name: Build image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .

      # 5. 推送镜像到AWS ECR
      - name: Push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      # 6. 安装kubectl工具
      - name: Install kubectl
        uses: Azure/setup-kubectl@v4

      # 7. base64解码生成kubeconfig
      - name: Write kubeconfig
        run: |
          mkdir -p ~/.kube
          cat > ~/.kube/config << EOF
          apiVersion: v1
          clusters:
          - cluster:
              certificate-authority-data: LS0tLS1CRUdJTi...
              server: https://13.58.193.237:6443
            name: default
           contexts:
          - context:
              cluster: default
              user: default
            name: default
          current-context: default
          kind: Config
          users:
          - name: default
            user:
              client-certificate-data: LS0tLS1CRUdJTi...
              client-key-data: LS0tLS1CRUdJTi...
          EOF

# 8. 更新k8s镜像
      - name: Update k8s deployment
        run: |
          kubectl set image deployment/my-python-app my-python-app=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      # 9. 等待应用滚动更新完成
      - name: Wait rollout finish
        run: |
          kubectl rollout status deployment/my-python-app
