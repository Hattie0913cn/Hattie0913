name: Build & Deploy Python App

on:
  push:
    branches: [ main ] # 只有推送到 main 分支才触发

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
  # 【注意】这里定义你的应用名字，建议和 K8s 里的 Deployment 名字保持一致
  APP_NAME: "my-python-app" 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. 拉取代码
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. 配置 AWS 凭证
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    # 3. 登录 ECR
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    # 4. 构建 Docker 镜像
    - name: Build image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }} # 使用 Git 的 commit ID 作为标签，确保唯一
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .

    # 5. 推送镜像到 ECR
    - name: Push image to ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

    # 6. 安装 kubectl 工具
    - name: Install kubectl
      uses: azure/setup-kubectl@v4

           # 7-9. 配置集群并部署应用 (已修正 Secret 名称)
    - name: Setup & Deploy to K3s
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
        # 定义配置文件路径变量
        KUBE_CONFIG_PATH: ${{ runner.temp }}/kubeconfig
      run: |
        echo "🔧 正在配置 Kubeconfig..."
        
        # 1. 写入配置文件
        # 【注意】这里改成了 KUBE_CONFIG，与你截图中的 Secret 名称一致
        mkdir -p $HOME/.kube
        echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $KUBE_CONFIG_PATH
        
        # 检查文件是否生成成功
        if [ ! -s "$KUBE_CONFIG_PATH" ]; then
          echo "❌ 错误：Kubeconfig 文件为空，请检查 Secret 'KUBE_CONFIG' 是否正确设置（必须是 Base64 编码）。"
          exit 1
        fi
        
        echo "🚀 正在部署应用到 K3s..."
        
        # 2. 生成 YAML 并应用
        # --dry-run=client: 本地生成，不请求服务器
        # --kubeconfig: 显式指定刚才生成的配置文件
        kubectl create deployment $APP_NAME \
          --image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
          --replicas=1 --port=80 \
          --dry-run=client -o yaml \
          --kubeconfig=$KUBE_CONFIG_PATH | kubectl apply --kubeconfig=$KUBE_CONFIG_PATH -f -

        echo "⏳ 等待部署 rollout 完成..."
        # 3. 等待滚动更新完成
        kubectl rollout status deployment/$APP_NAME \
          --timeout=300s \
          --kubeconfig=$KUBE_CONFIG_PATH
          
        echo "✅ 部署完成！"
