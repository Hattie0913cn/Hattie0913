name: Build & Deploy Python App

on:
  push:
    branches: [ main ] # 只有推送到 main 分支才触发

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
  # 【注意】这里定义你的应用名字，建议和 K8s 里的 Deployment 名字保持一致
  APP_NAME: "my-python-app" 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. 拉取代码
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. 配置 AWS 凭证
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    # 3. 登录 ECR
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    # 4. 构建 Docker 镜像
    - name: Build image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }} # 使用 Git 的 commit ID 作为标签，确保唯一
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .

    # 5. 推送镜像到 ECR
    - name: Push image to ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

    # 6. 安装 kubectl 工具
    - name: Install kubectl
      uses: azure/setup-kubectl@v4

        # 7. 准备 Kubeconfig (确保这一步在你的 Deploy 步骤之前)
    - name: Setup Kubeconfig
      run: |
        # 创建 .kube 目录
        mkdir -p $HOME/.kube
        # 将 secrets 中的配置写入文件 (假设你的 secret 名字叫 KUBE_CONFIG_DATA)
        echo "${{ secrets.KUBE_CONFIG_DATA }}" | base64 -d > $HOME/.kube/config
        # 【关键】设置环境变量，让 kubectl 知道去哪里找证书
        echo "KUBECONFIG=$HOME/.kube/config" >> $GITHUB_ENV

    # 8. 部署或更新应用 (修复了认证和语法错误)
    - name: Deploy to K3s
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        echo "🚀 正在部署应用到 K3s..."

        # 检查连接是否正常
        kubectl cluster-info --insecure-skip-tls-verify

        # 使用单行命令解决管道符报错
        # --validate=false 跳过镜像拉取校验（解决私有仓库报错）
        kubectl create deployment $APP_NAME \
          --image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
          --replicas=1 \
          --port=80 \
          --dry-run=client -o yaml \

          | kubectl apply --insecure-skip-tls-verify --validate=false -f -

        echo "✅ 部署指令已发送"

    # 9. 等待部署完成
    - name: Wait for rollout
      run: |
        echo "⏳ 等待 Pod 启动..."
        kubectl rollout status deployment/$APP_NAME --timeout=120s --insecure-skip-tls-verify
