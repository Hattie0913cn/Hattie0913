name: Build & Deploy Python App

on:
  push:
    branches: [ main ] # 只有推送到 main 分支才触发

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
  # 【注意】这里定义你的应用名字，建议和 K8s 里的 Deployment 名字保持一致
  APP_NAME: "my-python-app" 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. 拉取代码
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. 配置 AWS 凭证
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    # 3. 登录 ECR
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    # 4. 构建 Docker 镜像
    - name: Build image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }} # 使用 Git 的 commit ID 作为标签，确保唯一
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .

    # 5. 推送镜像到 ECR
    - name: Push image to ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

    # 6. 安装 kubectl 工具
    - name: Install kubectl
      uses: azure/setup-kubectl@v4

                     # 7-9. 配置集群并部署应用 (修复 x509 证书验证失败)
    - name: Setup & Deploy to K3s
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
        APP_NAME: my-python-app
        KUBE_CONFIG_PATH: ${{ runner.temp }}/kubeconfig
      run: |
        echo "🔧 正在配置 Kubeconfig..."
        
        # 1. 写入配置文件
        mkdir -p $HOME/.kube
        echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $KUBE_CONFIG_PATH
        
        echo "🚀 正在部署应用到 K3s..."
        
        # 2. 直接部署 (使用单行命令避免语法错误，并强制跳过 TLS 验证)
        # --kubeconfig: 指定配置文件
        # --insecure-skip-tls-verify: 【关键】忽略公网 IP 的证书报错
        kubectl --kubeconfig=$KUBE_CONFIG_PATH \
          --insecure-skip-tls-verify \
          create deployment $APP_NAME \
          --image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
          --replicas=1 \
          --port=80 \
          --dry-run=client -o yaml | \
        kubectl --kubeconfig=$KUBE_CONFIG_PATH \
          --insecure-skip-tls-verify \
          apply -f -
          
        echo "✅ 部署命令已发送"
        
        # 3. 等待部署完成 (同样需要加跳过验证参数)
        kubectl --kubeconfig=$KUBE_CONFIG_PATH \
          --insecure-skip-tls-verify \
          rollout status deployment/$APP_NAME --timeout=120s
